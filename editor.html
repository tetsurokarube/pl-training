<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>損益計算書 基礎研修資料</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Hiragino Sans", "Hiragino Kana Gothic ProN", Meiryo, sans-serif;
      background: #ffffff;
      color: #37352f;
      font-size: 16px;
      line-height: 1.6;
    }

    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 44px;
      background: #fff;
      border-bottom: 1px solid #e9e9e7;
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 1000;
      gap: 12px;
    }

    .topbar-icon { font-size: 18px; }
    .topbar-title { font-size: 14px; font-weight: 500; color: #37352f; flex: 1; }

    .save-status { font-size: 12px; color: #9b9a97; transition: color 0.3s; }
    .save-status.saving { color: #e9a84b; }
    .save-status.saved  { color: #4caf50; }
    .save-status.error  { color: #e03e3e; }

    .main {
      max-width: 860px;
      margin: 0 auto;
      padding: 80px 96px 200px;
    }

    .page-cover {
      height: 6px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      position: fixed;
      top: 44px; left: 0; right: 0;
      z-index: 999;
    }

    .page-title {
      font-size: 38px;
      font-weight: 700;
      color: #37352f;
      margin-bottom: 4px;
      outline: none;
      line-height: 1.2;
      min-height: 50px;
      word-break: break-word;
    }

    .page-title:empty::before {
      content: 'タイトルなし';
      color: #e2e2e2;
    }

    .page-meta {
      font-size: 12px;
      color: #9b9a97;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid #f1f1ef;
    }

    /* EditorJS Notion スタイル */
    .codex-editor { font-size: 16px; }
    .ce-block__content { max-width: 100%; }
    .cdx-block { padding: 3px 0; }

    .ce-paragraph { line-height: 1.7; }
    .ce-paragraph[data-placeholder]:empty::before { color: #c7c5c0; font-style: normal; }

    .ce-toolbar__plus,
    .ce-toolbar__settings-btn {
      color: #9b9a97 !important;
      border-radius: 4px;
    }
    .ce-toolbar__plus:hover,
    .ce-toolbar__settings-btn:hover {
      background: #f1f1ef !important;
      color: #37352f !important;
    }

    .ce-header { font-weight: 600; line-height: 1.3; }
    h1.ce-header { font-size: 30px; margin-top: 24px; margin-bottom: 4px; }
    h2.ce-header { font-size: 22px; margin-top: 20px; margin-bottom: 2px; }
    h3.ce-header { font-size: 18px; margin-top: 16px; margin-bottom: 2px; }

    .cdx-quote {
      border-left: 4px solid #37352f;
      padding-left: 16px;
      margin: 8px 0;
    }
    .cdx-quote__text { font-style: italic; color: #37352f; }
    .cdx-quote__caption { font-size: 13px; color: #9b9a97; margin-top: 6px; }

    .tc-table { border-collapse: collapse; width: 100%; margin: 8px 0; }
    .tc-cell {
      border: 1px solid #e9e9e7 !important;
      padding: 8px 12px !important;
      min-width: 80px;
    }
    .tc-row:first-child .tc-cell { background: #f7f6f3; font-weight: 600; }

    .cdx-checklist__item { display: flex; align-items: flex-start; gap: 8px; padding: 3px 0; }
    .cdx-checklist__item-checkbox {
      width: 16px; height: 16px;
      border: 2px solid #9b9a97;
      border-radius: 3px;
      flex-shrink: 0;
      margin-top: 3px;
    }
    .cdx-checklist__item--checked .cdx-checklist__item-checkbox {
      background: #2eaadc;
      border-color: #2eaadc;
    }

    .cdx-delimiter::before {
      content: '···';
      color: #9b9a97;
      font-size: 20px;
      letter-spacing: 8px;
    }

    .cdx-marker { background: rgba(255, 212, 0, 0.35); padding: 0 2px; border-radius: 2px; }
    .inline-code {
      background: rgba(135, 131, 120, 0.15);
      border-radius: 3px;
      padding: 0.2em 0.4em;
      font-size: 85%;
      font-family: 'SF Mono', Consolas, monospace;
    }

    .ce-inline-toolbar { border-radius: 6px !important; box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important; }
    .ce-conversion-toolbar { border-radius: 6px !important; }
    .ce-popover { border-radius: 8px !important; box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important; }
    .ce-popover-item__icon { border-radius: 4px !important; }

    .slash-hint {
      position: fixed;
      bottom: 24px; right: 24px;
      background: #f7f6f3;
      border: 1px solid #e9e9e7;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px;
      color: #9b9a97;
      pointer-events: none;
    }
    .slash-hint kbd {
      background: #fff;
      border: 1px solid #d9d8d6;
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 11px;
      font-family: monospace;
    }

    @media (max-width: 768px) {
      .main { padding: 70px 20px 200px; }
      .page-title { font-size: 28px; }
    }
  </style>
</head>
<body>

  <div class="page-cover"></div>

  <div class="topbar">
    <span class="topbar-icon">📄</span>
    <span class="topbar-title">損益計算書 基礎研修資料</span>
    <span class="save-status" id="saveStatus">読み込み中...</span>
  </div>

  <div class="main">
    <div
      class="page-title"
      contenteditable="true"
      id="pageTitle"
      spellcheck="false"
    >損益計算書の基礎と勘定科目研修</div>
    <div class="page-meta" id="pageMeta">最終更新: ―</div>
    <div id="editor"></div>
  </div>

  <div class="slash-hint"><kbd>/</kbd> でブロックを追加 &nbsp;|&nbsp; <kbd>Tab</kbd> でインデント</div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- EditorJS -->
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@latest/dist/editorjs.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@latest/dist/header.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@latest/dist/list.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/checklist@latest/dist/checklist.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/quote@latest/dist/quote.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/table@latest/dist/table.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/delimiter@latest/dist/delimiter.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/marker@latest/dist/marker.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@editorjs/inline-code@latest/dist/inline-code.umd.min.js"></script>

  <script>
    // ===== Firebase =====
    const firebaseConfig = {
      apiKey: "AIzaSyAfb_tsYUp-Vp1PgsSDaZ487EFfGEfDKjk",
      authDomain: "pl-training-4b448.firebaseapp.com",
      projectId: "pl-training-4b448",
      storageBucket: "pl-training-4b448.firebasestorage.app",
      messagingSenderId: "251592877189",
      appId: "1:251592877189:web:9ccb443abf38f0fc9175ec"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection('documents').doc('main');

    const saveStatusEl = document.getElementById('saveStatus');
    const pageMetaEl   = document.getElementById('pageMeta');
    let saveTimer = null;
    let editor = null;

    function setStatus(type, text) {
      saveStatusEl.className = 'save-status ' + type;
      saveStatusEl.textContent = text;
    }

    // ===== 保存 =====
    async function saveContent() {
      if (!editor) return;
      try {
        setStatus('saving', '保存中...');
        const data = await editor.save();
        const title = document.getElementById('pageTitle').innerText.trim();
        await docRef.set({
          title: title,
          blocks: data,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        setStatus('saved', '保存済み ✓');
        pageMetaEl.textContent = '最終更新: ' + new Date().toLocaleString('ja-JP');
      } catch (err) {
        console.error('Save error:', err);
        setStatus('error', '保存エラー');
      }
    }

    function scheduleSave() {
      clearTimeout(saveTimer);
      setStatus('saving', '入力中...');
      saveTimer = setTimeout(saveContent, 1500);
    }

    // ===== EditorJS 初期化 =====
    async function initEditor(savedData) {
      editor = new EditorJS({
        holder: 'editor',
        placeholder: 'ここに入力、または / でブロックを追加...',
        tools: {
          header: {
            class: Header,
            inlineToolbar: true,
            config: { placeholder: '見出しを入力...', levels: [1, 2, 3], defaultLevel: 2 }
          },
          list: {
            class: List,
            inlineToolbar: true,
            config: { defaultStyle: 'unordered' }
          },
          checklist: {
            class: Checklist,
            inlineToolbar: true
          },
          quote: {
            class: Quote,
            inlineToolbar: true,
            config: { quotePlaceholder: '引用文...', captionPlaceholder: '出典' }
          },
          table: {
            class: Table,
            inlineToolbar: true,
            config: { rows: 3, cols: 3, withHeadings: true }
          },
          delimiter: Delimiter,
          marker: {
            class: Marker,
            shortcut: 'CMD+SHIFT+M'
          },
          inlineCode: {
            class: InlineCode,
            shortcut: 'CMD+SHIFT+C'
          }
        },
        data: savedData || {
          blocks: [
            { type: 'header',    data: { text: 'はじめに', level: 2 } },
            { type: 'paragraph', data: { text: 'このページに研修内容を入力してください。<kbd>/</kbd> キーでブロック（見出し・リスト・表など）を追加できます。' } },
            { type: 'header',    data: { text: '損益計算書とは', level: 2 } },
            { type: 'paragraph', data: { text: 'ここに内容を入力...' } },
          ]
        },
        onChange: scheduleSave,
        i18n: {
          messages: {
            toolNames: {
              Text: 'テキスト',
              Heading: '見出し',
              List: 'リスト',
              Checklist: 'チェックリスト',
              Quote: '引用',
              Table: '表',
              Delimiter: '区切り線',
              Marker: 'マーカー',
              'Inline Code': 'コード',
              Bold: '太字',
              Italic: '斜体',
              Link: 'リンク'
            },
            tools: {
              list: { Unordered: '箇条書き', Ordered: '番号付きリスト' },
              stub: { 'The block can not be displayed correctly.': 'このブロックは表示できません' }
            },
            ui: {
              blockTunes: { toggler: { 'Click to tune': 'メニュー', 'or drag to move': 'ドラッグで移動' } },
              inlineToolbar: { converter: { 'Convert to': '変換' } },
              toolbar: { toolbox: { Add: '追加' } },
              popover: { Filter: '検索', 'Nothing found': '見つかりません' }
            }
          }
        }
      });

      await editor.isReady;
    }

    // ===== 起動 =====
    async function init() {
      setStatus('', '読み込み中...');
      try {
        const snap = await docRef.get();
        if (snap.exists) {
          const data = snap.data();
          if (data.title) {
            document.getElementById('pageTitle').innerText = data.title;
          }
          if (data.updatedAt) {
            const d = data.updatedAt.toDate();
            pageMetaEl.textContent = '最終更新: ' + d.toLocaleString('ja-JP');
          }
          await initEditor(data.blocks || null);
        } else {
          await initEditor(null);
        }
        setStatus('saved', '保存済み ✓');
      } catch (err) {
        console.error('Load error:', err);
        setStatus('error', '読み込みエラー');
        await initEditor(null);
      }

      document.getElementById('pageTitle').addEventListener('input', scheduleSave);
    }

    init();
  </script>
</body>
</html>
