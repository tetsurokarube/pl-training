  // ===== 保存 =====
  async function saveContent() {
    if (!editor) return;
    try {
      setStatus('saving', '保存中...');
      const data = await editor.save();
      const title = document.getElementById('pageTitle').innerText.trim();
      await docRef.set({
        title: title,
        blocks: data,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      setStatus('saved', '保存済み ✓');
      pageMetaEl.textContent = '最終更新: ' + new Date().toLocaleString('ja-JP');
    } catch (err) {
      console.error(err);
      setStatus('error', '保存エラー');
    }
  }

  function scheduleSave() {
    clearTimeout(saveTimer);
    setStatus('saving', '入力中...');
    saveTimer = setTimeout(saveContent, 1500);
  }

  // ===== 元のコンテンツに戻す =====
  async function resetContent() {
    if (!confirm('元のコンテンツに戻しますか？\n現在の内容は上書きされます。')) return;
    if (!editor) return;
    document.getElementById('pageTitle').innerText = '損益計算書の基礎と勘定科目研修';
    await editor.render(INITIAL_CONTENT);
    await saveContent();
  }

  // ===== EditorJS 初期化 =====
  async function initEditor(savedData) {
    editor = new EditorJS({
      holder: 'editor',
      placeholder: 'ここに入力、または / でブロックを追加...',
      tools: {
        header: {
          class: Header, inlineToolbar: true,
          config: { placeholder: '見出しを入力...', levels: [1, 2, 3], defaultLevel: 2 }
        },
        list: { class: List, inlineToolbar: true, config: { defaultStyle: 'unordered' } },
        checklist: { class: Checklist, inlineToolbar: true },
        quote: {
          class: Quote, inlineToolbar: true,
          config: { quotePlaceholder: '引用文...', captionPlaceholder: '出典' }
        },
        table: { class: Table, inlineToolbar: true, config: { rows: 3, cols: 3, withHeadings: true } },
        delimiter: Delimiter,
        marker: { class: Marker, shortcut: 'CMD+SHIFT+M' },
        inlineCode: { class: InlineCode, shortcut: 'CMD+SHIFT+C' }
      },
      data: savedData || INITIAL_CONTENT,
      onChange: scheduleSave,
      i18n: {
        messages: {
          toolNames: {
            Text: 'テキスト', Heading: '見出し', List: 'リスト',
            Checklist: 'チェックリスト', Quote: '引用', Table: '表',
            Delimiter: '区切り線', Marker: 'マーカー', 'Inline Code': 'コード',
            Bold: '太字', Italic: '斜体', Link: 'リンク'
          },
          tools: { list: { Unordered: '箇条書き', Ordered: '番号付きリスト' } },
          ui: {
            blockTunes: { toggler: { 'Click to tune': 'メニュー', 'or drag to move': 'ドラッグで移動' } },
            inlineToolbar: { converter: { 'Convert to': '変換' } },
            toolbar: { toolbox: { Add: '追加' } },
            popover: { Filter: '検索', 'Nothing found': '見つかりません' }
          }
        }
      }
    });
    await editor.isReady;
  }

  // ===== 起動 =====
  async function init() {
    setStatus('', '読み込み中...');
    try {
      const snap = await docRef.get();
      if (snap.exists) {
        const data = snap.data();
        if (data.title) document.getElementById('pageTitle').innerText = data.title;
        if (data.updatedAt) pageMetaEl.textContent = '最終更新: ' + data.updatedAt.toDate().toLocaleString('ja-JP');
        await initEditor(data.blocks || null);
      } else {
        await initEditor(null);
        await saveContent(); // 初回：元コンテンツをFirebaseに保存
      }
      setStatus('saved', '保存済み ✓');
    } catch (err) {
      console.error(err);
      setStatus('error', '読み込みエラー');
      await initEditor(null);
    }
    document.getElementById('pageTitle').addEventListener('input', scheduleSave);
  }

  init();
  </script>
